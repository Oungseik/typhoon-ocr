build:
  gpu: true
  python_version: "3.11"
  system_packages:
    - "git"
    - "ninja-build"
    - "poppler-utils"
  python_requirements: replicate-requirements.txt
  run:
    - "python -m venv /opt/vllm"
    - "/opt/vllm/bin/pip install --upgrade pip"
    - "/opt/vllm/bin/pip install 'pydantic>=2.9,<3' 'fastapi>=0.115,<1' vllm"

predict: "predict.py:Predictor"
